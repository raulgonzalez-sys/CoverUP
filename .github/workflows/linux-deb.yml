name: Linux .deb

# Builds a self-contained .deb (PyInstaller bundle) and attaches it to the
# matching GitHub release. Runs on ubuntu-22.04 on purpose: building against an
# older glibc keeps the package working on a wider range of distros.
#
# Triggers:
#   - Pushing a version tag (e.g. 0.8.0) builds and attaches to that release.
#   - Manual run (workflow_dispatch) lets you target an existing tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the .deb to (e.g. 0.8.0)"
        required: true
        default: "0.8.0"
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tk + packaging tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk fakeroot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          pip install .

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm --onedir --name coverup CoverUP.py

      - name: Resolve version tag
        id: ver
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: bash packaging/build-deb.sh "${{ steps.ver.outputs.tag }}" dist/coverup dist-deb

      - name: Upload .deb as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverup-${{ steps.ver.outputs.tag }}-deb
          path: dist-deb/*.deb

      - name: Attach .deb to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist-deb/*.deb
