name: Linux .rpm

# Builds a self-contained .rpm (PyInstaller bundle, packaged with fpm) and
# attaches it to the matching GitHub release. Runs on ubuntu-22.04 (older
# glibc) so the bundle works across a wide range of RPM distros.
#
# Triggers:
#   - Pushing a version tag (e.g. 0.8.0) builds and attaches to that release.
#   - Manual run (workflow_dispatch) lets you target an existing tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the .rpm to (e.g. 0.8.0)"
        required: true
        default: "0.8.0"
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Tk + rpm + fpm)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk rpm ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          pip install .

      - name: Build executable (PyInstaller)
        run: pyinstaller --noconfirm --onedir --name coverup CoverUP.py

      - name: Resolve version tag
        id: ver
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build .rpm
        run: bash packaging/build-rpm.sh "${{ steps.ver.outputs.tag }}" dist/coverup dist-rpm

      - name: Inspect .rpm (evidence)
        run: |
          echo "::group::rpm -qpi"
          rpm -qpi dist-rpm/*.rpm || true
          echo "::endgroup::"
          echo "::group::key paths"
          rpm -qlp dist-rpm/*.rpm | grep -E "(^|/)(usr/bin/coverup|usr/share/applications/coverup.desktop|coverup.svg|opt/coverup/coverup)$" || true
          echo "::endgroup::"

      - name: Upload .rpm as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverup-${{ steps.ver.outputs.tag }}-rpm
          path: dist-rpm/*.rpm

      - name: Attach .rpm to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist-rpm/*.rpm
