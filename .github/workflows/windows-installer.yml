name: Windows installer

# Builds a Windows .exe with PyInstaller, wraps it in an Inno Setup installer,
# and attaches the installer to the matching GitHub release.
#
# Triggers:
#   - Pushing a version tag (e.g. 0.8.0) builds and attaches to that release.
#   - Manual run (workflow_dispatch) lets you target an existing tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the installer to (e.g. 0.8.0)"
        required: true
        default: "0.8.0"
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          pip install .

      - name: Build executable (PyInstaller)
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name CoverUP --icon CoverUP.ico CoverUP.py

      - name: Bundle Tesseract OCR into the app
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $src = "C:\Program Files\Tesseract-OCR"
          if (-not (Test-Path "$src\tesseract.exe")) {
            $found = Get-ChildItem -Path "C:\Program Files","C:\Program Files (x86)","C:\ProgramData\chocolatey" -Recurse -Filter tesseract.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $src = $found.DirectoryName }
          }
          if (-not (Test-Path "$src\tesseract.exe")) { throw "tesseract.exe not found after choco install" }
          Write-Host "Tesseract found at $src"
          $dst = "dist\CoverUP\_internal\tesseract"
          New-Item -ItemType Directory -Force -Path $dst, "dist\CoverUP\_internal\tessdata" | Out-Null
          # Copy the whole program dir: tesseract.exe plus the DLLs it resolves
          # from its own folder on Windows.
          Copy-Item "$src\*" $dst -Recurse -Force
          # Ensure the base English model sits at our tessdata convention.
          $eng = Get-ChildItem -Path $src -Recurse -Filter eng.traineddata -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $eng) { throw "eng.traineddata not found in tesseract install" }
          Copy-Item $eng.FullName "dist\CoverUP\_internal\tessdata\eng.traineddata" -Force
          Write-Host "Smoke test:"
          & "$dst\tesseract.exe" --version

      - name: Resolve version tag
        id: ver
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.ver.outputs.tag }} installer\CoverUP.iss

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoverUP-${{ steps.ver.outputs.tag }}-setup
          path: installer/Output/*.exe

      - name: Attach installer to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: installer/Output/*.exe
